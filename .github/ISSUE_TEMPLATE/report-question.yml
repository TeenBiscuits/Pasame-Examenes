name: Reportar error en pregunta
description: Reportar un error o sugerir una mejora para una pregunta
title: "[Corregir Pregunta]"
labels: ["question-report", "bug"]
body:
  - type: markdown
    attributes:
      value: |
        ¡Gracias por ayudar a mejorar Pásame Exámenes! El **ID de la pregunta** se encuentra junto al enlace "Reportar error" en la página de revisión.

  - type: input
    id: subject
    attributes:
      label: Asignatura
      description: ¿A qué asignatura pertenece esta pregunta? (ej. "eseo", "emeele")
      placeholder: "ej: eseo"
    validations:
      required: true

  - type: input
    id: question-id
    attributes:
      label: ID de la pregunta
      description: El identificador único de la pregunta que aparece junto al botón "Reportar error"
      placeholder: "ej: 2024_q1"
    validations:
      required: true

  - type: dropdown
    id: question-type
    attributes:
      label: Tipo de pregunta
      description: Opcionalmente, ¿de qué tipo es esta pregunta?
      options:
        - Opción múltiple (mc)
        - Texto libre (text)
        - Cálculo (calculation)
        - Emparejamiento (matching)
    validations:
      required: false

  - type: textarea
    id: issue-description
    attributes:
      label: Descripción del error
      description: |
        Describe el problema. Por ejemplo:
        - La solución modelo es incorrecta…
        - La explicación es errónea o confusa…
        - El enunciado tiene una errata…
        - Las opciones son incorrectas…
        - La pregunta debería clasificarse de otra forma…
      placeholder: La solución modelo es incorrecta porque...
    validations:
      required: true

  - type: textarea
    id: suggested-fix
    attributes:
      label: Corrección sugerida (opcional)
      description: Si conoces la respuesta correcta, compártela aquí.
      placeholder: La respuesta correcta debería ser...
    validations:
      required: false
